<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countdown to New Year 2027</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0a0a0a;
      color: #f0f0f0;
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    h1 {
      font-size: 2rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #aaaaaa;
      margin-bottom: 3rem;
    }

    #countdown {
      display: flex;
      gap: 2.5rem;
      align-items: flex-start;
    }

    .time-unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .time-value {
      font-size: 6rem;
      font-weight: 700;
      line-height: 1;
      color: #ffffff;
      letter-spacing: -0.02em;
      min-width: 2ch;
      text-align: center;
    }

    .time-label {
      font-size: 0.9rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #666666;
    }

    .separator {
      font-size: 5rem;
      font-weight: 700;
      color: #333333;
      line-height: 1;
      padding-top: 0.05em;
    }

    #complete-message {
      display: none;
      font-size: 3rem;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 0.1em;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>Countdown to New Year 2027</h1>

  <div id="countdown">
    <div class="time-unit">
      <span class="time-value" id="days">00</span>
      <span class="time-label">Days</span>
    </div>
    <span class="separator">:</span>
    <div class="time-unit">
      <span class="time-value" id="hours">00</span>
      <span class="time-label">Hours</span>
    </div>
    <span class="separator">:</span>
    <div class="time-unit">
      <span class="time-value" id="minutes">00</span>
      <span class="time-label">Minutes</span>
    </div>
    <span class="separator">:</span>
    <div class="time-unit">
      <span class="time-value" id="seconds">00</span>
      <span class="time-label">Seconds</span>
    </div>
  </div>

  <div id="complete-message">Happy New Year 2027!</div>

  <script>
    const TARGET = new Date('2027-01-01T00:00:00');

    function calculateTimeRemaining() {
      const now = Date.now();
      const diff = TARGET.getTime() - now;

      if (diff <= 0) {
        return { days: 0, hours: 0, minutes: 0, seconds: 0, done: true };
      }

      const totalSeconds = Math.floor(diff / 1000);
      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      return { days, hours, minutes, seconds, done: false };
    }

    function formatTimeUnit(value) {
      return String(value).padStart(2, '0');
    }

    function updateDisplay() {
      const { days, hours, minutes, seconds, done } = calculateTimeRemaining();

      if (done) {
        document.getElementById('countdown').style.display = 'none';
        document.getElementById('complete-message').style.display = 'block';
        return;
      }

      document.getElementById('days').textContent = formatTimeUnit(days);
      document.getElementById('hours').textContent = formatTimeUnit(hours);
      document.getElementById('minutes').textContent = formatTimeUnit(minutes);
      document.getElementById('seconds').textContent = formatTimeUnit(seconds);
    }

    document.addEventListener('DOMContentLoaded', function () {
      updateDisplay();
      setInterval(updateDisplay, 1000);
    });
  </script>
</body>
</html>
