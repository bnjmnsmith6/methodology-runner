<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emotional State</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }
    h1 {
      font-size: 1.4rem;
      color: #333;
      margin-bottom: 2rem;
    }
    #emoji-display {
      font-size: 8rem;
      min-height: 10rem;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 2rem;
    }
    #placeholder {
      font-size: 1rem;
      color: #aaa;
    }
    .emotion-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
      max-width: 480px;
    }
    button {
      padding: 0.6rem 1.2rem;
      font-size: 1rem;
      border: 2px solid #ccc;
      border-radius: 8px;
      background: white;
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s;
    }
    button:hover {
      background: #e8f0fe;
      border-color: #4a90d9;
    }
    button.active {
      background: #4a90d9;
      color: white;
      border-color: #4a90d9;
    }
  </style>
</head>
<body>
  <h1>How are you feeling?</h1>
  <div id="emoji-display">
    <span id="placeholder">Click an emotion below</span>
  </div>
  <div class="emotion-grid">
    <button data-emotion="happy" data-emoji="😊">Happy</button>
    <button data-emotion="sad" data-emoji="😢">Sad</button>
    <button data-emotion="angry" data-emoji="😠">Angry</button>
    <button data-emotion="surprised" data-emoji="😮">Surprised</button>
    <button data-emotion="neutral" data-emoji="😐">Neutral</button>
    <button data-emotion="fearful" data-emoji="😨">Fearful</button>
    <button data-emotion="disgusted" data-emoji="🤢">Disgusted</button>
    <button data-emotion="excited" data-emoji="😄">Excited</button>
  </div>
  <script>
    const display = document.getElementById('emoji-display');
    const placeholder = document.getElementById('placeholder');
    const buttons = document.querySelectorAll('button[data-emoji]');

    buttons.forEach(function(btn) {
      btn.addEventListener('click', function() {
        buttons.forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        if (placeholder) placeholder.remove();
        display.textContent = btn.dataset.emoji;
      });
    });
  </script>
</body>
</html>
