<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random Color Palette Generator</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    h1 {
      color: #e0e0e0;
      margin-bottom: 2rem;
      font-size: 1.8rem;
      letter-spacing: 0.05em;
    }

    .palette {
      display: flex;
      gap: 1rem;
      width: 100%;
      max-width: 900px;
      margin-bottom: 2rem;
    }

    .color-box {
      flex: 1;
      height: 300px;
      border-radius: 12px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 1rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      transition: transform 0.2s ease;
      cursor: default;
    }

    .color-box:hover {
      transform: translateY(-4px);
    }

    .hex-label {
      background: rgba(0, 0, 0, 0.45);
      color: #fff;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      padding: 0.3rem 0.6rem;
      border-radius: 6px;
      text-transform: uppercase;
      user-select: all;
    }

    button#generate {
      background: #e94560;
      color: #fff;
      border: none;
      padding: 0.85rem 2.5rem;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    button#generate:hover {
      background: #c73652;
      transform: translateY(-2px);
    }

    button#generate:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <h1>Random Color Palette</h1>
  <div class="palette" id="palette">
    <div class="color-box" id="color-0"><span class="hex-label"></span></div>
    <div class="color-box" id="color-1"><span class="hex-label"></span></div>
    <div class="color-box" id="color-2"><span class="hex-label"></span></div>
    <div class="color-box" id="color-3"><span class="hex-label"></span></div>
    <div class="color-box" id="color-4"><span class="hex-label"></span></div>
  </div>
  <button id="generate">Generate</button>

  <script>
    function generateRandomColor() {
      var r = Math.floor(Math.random() * 256);
      var g = Math.floor(Math.random() * 256);
      var b = Math.floor(Math.random() * 256);
      return '#' +
        ('0' + r.toString(16)).slice(-2) +
        ('0' + g.toString(16)).slice(-2) +
        ('0' + b.toString(16)).slice(-2);
    }

    function colorsAreSimilar(a, b) {
      var rA = parseInt(a.slice(1, 3), 16);
      var gA = parseInt(a.slice(3, 5), 16);
      var bA = parseInt(a.slice(5, 7), 16);
      var rB = parseInt(b.slice(1, 3), 16);
      var gB = parseInt(b.slice(3, 5), 16);
      var bB = parseInt(b.slice(5, 7), 16);
      var dist = Math.sqrt(
        Math.pow(rA - rB, 2) +
        Math.pow(gA - gB, 2) +
        Math.pow(bA - bB, 2)
      );
      return dist < 60;
    }

    function generatePalette() {
      var colors = [];
      var attempts = 0;
      while (colors.length < 5 && attempts < 200) {
        attempts++;
        var candidate = generateRandomColor();
        var tooSimilar = false;
        for (var i = 0; i < colors.length; i++) {
          if (colorsAreSimilar(candidate, colors[i])) {
            tooSimilar = true;
            break;
          }
        }
        if (!tooSimilar) {
          colors.push(candidate);
        }
      }
      // Fallback: fill remaining slots if attempts exhausted
      while (colors.length < 5) {
        colors.push(generateRandomColor());
      }
      return colors;
    }

    function updateDisplay(colors) {
      for (var i = 0; i < 5; i++) {
        var box = document.getElementById('color-' + i);
        box.style.backgroundColor = colors[i];
        box.querySelector('.hex-label').textContent = colors[i];
      }
    }

    function init() {
      updateDisplay(generatePalette());
      document.getElementById('generate').addEventListener('click', function () {
        updateDisplay(generatePalette());
      });
    }

    init();
  </script>
</body>
</html>
