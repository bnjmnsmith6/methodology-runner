<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tip Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 400px;
      margin: 60px auto;
      padding: 0 20px;
      background: #f5f5f5;
    }
    h1 {
      text-align: center;
      color: #333;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    label {
      display: block;
      margin-bottom: 4px;
      color: #555;
      font-size: 14px;
    }
    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 16px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 16px;
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
      border-color: #4a90e2;
    }
    .result {
      margin-top: 8px;
      padding: 16px;
      background: #f0f7ff;
      border-radius: 4px;
      text-align: center;
    }
    .result-label {
      font-size: 14px;
      color: #555;
      margin-bottom: 4px;
    }
    .result-value {
      font-size: 32px;
      font-weight: bold;
      color: #2c7be5;
    }
  </style>
</head>
<body>
  <h1>Tip Calculator</h1>
  <div class="card">
    <label for="bill">Bill Amount ($)</label>
    <input type="number" id="bill" placeholder="0.00" min="0" step="0.01">

    <label for="tip">Tip Percentage (%)</label>
    <input type="number" id="tip" placeholder="0" min="0" max="100" step="1">

    <div class="result">
      <div class="result-label">Total</div>
      <div class="result-value" id="total">$0.00</div>
    </div>
  </div>

  <script>
    function calculate() {
      var bill = parseFloat(document.getElementById('bill').value);
      var tip = parseFloat(document.getElementById('tip').value);

      if (isNaN(bill) || isNaN(tip)) {
        document.getElementById('total').textContent = '$0.00';
        return;
      }

      var total = bill * (1 + tip / 100);
      document.getElementById('total').textContent = '$' + total.toFixed(2);
    }

    document.getElementById('bill').addEventListener('input', calculate);
    document.getElementById('tip').addEventListener('input', calculate);
  </script>
</body>
</html>
