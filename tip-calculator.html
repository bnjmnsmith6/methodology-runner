<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tip Calculator</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .calculator {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
      padding: 2rem;
      width: 100%;
      max-width: 400px;
    }

    h1 {
      font-size: 1.5rem;
      color: #1a202c;
      margin-bottom: 1.5rem;
      text-align: center;
    }

    .field {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 0.375rem;
    }

    input {
      width: 100%;
      padding: 0.625rem 0.875rem;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 1rem;
      color: #1a202c;
      transition: border-color 0.2s;
      outline: none;
    }

    input:focus {
      border-color: #4299e1;
    }

    input.error {
      border-color: #fc8181;
      background: #fff5f5;
    }

    .error-msg {
      font-size: 0.75rem;
      color: #e53e3e;
      margin-top: 0.25rem;
      min-height: 1rem;
    }

    .results {
      background: #ebf8ff;
      border-radius: 8px;
      padding: 1.25rem;
      margin-top: 1.5rem;
    }

    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.375rem 0;
      font-size: 0.9375rem;
      color: #2d3748;
    }

    .result-row.total {
      border-top: 2px solid #bee3f8;
      margin-top: 0.5rem;
      padding-top: 0.75rem;
      font-size: 1.125rem;
      font-weight: 700;
      color: #1a202c;
    }

    .result-value {
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>
<body>
  <div class="calculator">
    <h1>Tip Calculator</h1>

    <div class="field">
      <label for="bill">Bill Amount ($)</label>
      <input type="number" id="bill" placeholder="0.00" min="0" step="0.01">
      <div class="error-msg" id="bill-error"></div>
    </div>

    <div class="field">
      <label for="tip">Tip Percentage (%)</label>
      <input type="number" id="tip" placeholder="15" min="0" step="1" value="15">
      <div class="error-msg" id="tip-error"></div>
    </div>

    <div class="results">
      <div class="result-row">
        <span>Tip Amount</span>
        <span class="result-value" id="tip-amount">$0.00</span>
      </div>
      <div class="result-row total">
        <span>Total</span>
        <span class="result-value" id="total">$0.00</span>
      </div>
    </div>
  </div>

  <script>
    const billInput = document.getElementById('bill');
    const tipInput = document.getElementById('tip');
    const billError = document.getElementById('bill-error');
    const tipError = document.getElementById('tip-error');
    const tipAmountEl = document.getElementById('tip-amount');
    const totalEl = document.getElementById('total');

    function validateInput(value, allowNegative) {
      if (value === '' || value === null) return { valid: false, error: 'Please enter a value.' };
      const num = parseFloat(value);
      if (isNaN(num)) return { valid: false, error: 'Please enter a valid number.' };
      if (!allowNegative && num < 0) return { valid: false, error: 'Value must be 0 or greater.' };
      return { valid: true, value: num };
    }

    function formatCurrency(amount) {
      return '$' + amount.toFixed(2);
    }

    function calculateTip() {
      const billResult = validateInput(billInput.value, false);
      const tipResult = validateInput(tipInput.value, false);

      billError.textContent = billResult.valid ? '' : billResult.error;
      tipError.textContent = tipResult.valid ? '' : tipResult.error;
      billInput.classList.toggle('error', !billResult.valid && billInput.value !== '');
      tipInput.classList.toggle('error', !tipResult.valid && tipInput.value !== '');

      if (!billResult.valid || !tipResult.valid) {
        tipAmountEl.textContent = '$0.00';
        totalEl.textContent = '$0.00';
        return;
      }

      const bill = billResult.value;
      const tipPercent = tipResult.value;
      const tipAmount = Math.round(bill * tipPercent) / 100;
      const total = Math.round((bill + tipAmount) * 100) / 100;

      tipAmountEl.textContent = formatCurrency(tipAmount);
      totalEl.textContent = formatCurrency(total);
    }

    function updateDisplay() {
      calculateTip();
    }

    billInput.addEventListener('input', updateDisplay);
    tipInput.addEventListener('input', updateDisplay);

    // Initialize display
    updateDisplay();
  </script>
</body>
</html>
